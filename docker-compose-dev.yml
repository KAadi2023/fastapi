services:
  fastapi:
    build: .
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - .:/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
    # env_file:
    #   - .env
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_NAME=fastapi
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=Aditya@postgres2026
      - DATABASE_NAME=fastapi
      - JWT_SECRET_KEY="0d1cd7b6ef7c94c19f976f855e5fa779766227c0f104358704dc2456e85aae01"
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aditya@postgres2026
      POSTGRES_DB: fastapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: